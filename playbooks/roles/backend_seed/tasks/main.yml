---
# - name: Debug Set database variables
#   ansible.builtin.debug:
#     msg:
#     - "db_host: {{ db_host }}"
#     - "db_port: {{ db_port }}"
#     - "db_name: {{ db_name }}"
#     - "db_user: {{ db_user }}"
#     - "db_password: {{ db_password }}"
#     - "backend_service_name: {{ backend_service_name }}"
#     - "backend_app_dir: {{ backend_app_dir }}"
- name: Verify credentials
  command:
    argv:
      - aws 
      - sts 
      - get-caller-identity 
      - --region 
      - "{{ aws_region }}"

- name: Read database secret
  command:
    argv:
      - aws
      - secretsmanager
      - get-secret-value
      - --secret-id
      - "{{ db_secret_name }}"
      - --region
      - "{{ aws_region }}"
  register: secret_json

- name: Parse AWS response
  ansible.builtin.set_fact:
    secret: "{{ secret_json.stdout | from_json }}"

- name: Parse SecretString
  ansible.builtin.set_fact:
    db_credentials: "{{ secret.SecretString | from_json }}"
  
- name: Set database variables
  ansible.builtin.set_fact:
    db_host: "{{ db_credentials.db_host }}"
    db_port: "{{ db_credentials.db_port }}"
    db_name: "{{ db_credentials.db_name }}"
    db_username: "{{ db_credentials.db_username }}"
    db_password: "{{ db_credentials.db_password }}"

- name: Stop backend service
  become: true
  ansible.builtin.systemd:
    name: "{{ backend_service_name }}"
    state: stopped

- name: Run database seed
  become: false
  ansible.builtin.shell: |
    DB_HOST={{ db_host }} \
    DB_PORT={{ db_port }} \
    DB_NAME={{ db_name }} \
    DB_USER={{ db_username }} \
    DB_PASS={{ db_password }} \
    node seeds.js
  args:
    chdir: "{{ backend_app_dir }}"

- name: Reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart backend service
  become: true
  ansible.builtin.systemd:
    name: "{{ backend_service_name }}"
    state: restarted

- name: Get backend service status
  become: true
  ansible.builtin.command:
    cmd: systemctl status {{ backend_service_name }} --no-pager
  register: backend_status
  changed_when: false

- name: Show backend status
  ansible.builtin.debug:
    var: backend_status.stdout_lines
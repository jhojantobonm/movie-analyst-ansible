---
- name: Install packages
  ansible.builtin.apt:
    name:
      - git
      - nodejs
      - npm
      - stress-ng
    state: present
    update_cache: true

- name: Clone application
  ansible.builtin.git:
    repo: https://github.com/jhojantobonm/movie-analyst-ui.git
    dest: /home/ubuntu/movie-analyst-ui
    version: main

- name: Install npm dependencies
  community.general.npm:
    path: /home/ubuntu/movie-analyst-ui

- name: Deploy systemd service
  ansible.builtin.template:
    src: movie-frontend.service.j2
    dest: /etc/systemd/system/movie-frontend.service
    mode: "0644"
  notify: Restart frontend
